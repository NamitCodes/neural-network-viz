<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralLab — Interactive Neural Network Visualizer</title>
    <meta
      name="description"
      content="Visualize how neural networks learn and make predictions in real time. Interactive data points, configurable architecture, and animated gradient descent."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ── Header ────────────────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="header-left">
        <span class="logo-icon">⬡</span>
        <h1 class="app-title">Neural<span class="accent">Lab</span></h1>
      </div>
      <div class="header-status">
        <div class="status-pill" id="statusPill" data-state="idle">IDLE</div>
        <div class="stat-badge">Epoch&nbsp;<span id="epochCount">0</span></div>
        <div class="stat-badge">Loss&nbsp;<span id="lossDisplay">—</span></div>
      </div>
    </header>

    <!-- ── Main ──────────────────────────────────────────────────────────── -->
    <main class="app-main">
      <!-- Left: visualisations -->
      <div class="viz-panel">
        <!-- Decision boundary -->
        <div class="canvas-card" id="mainCanvasCard">
          <div class="card-header">
            <span class="card-title">DECISION BOUNDARY</span>
            <div class="canvas-legend">
              <span class="legend-dot class-a"></span><span>Class A</span>
              <span class="legend-dot class-b"></span><span>Class B</span>
            </div>
          </div>
          <div class="canvas-wrapper">
            <canvas id="mainCanvas" width="400" height="400"></canvas>
          </div>
        </div>

        <!-- Network architecture diagram -->
        <div class="canvas-card">
          <div class="card-header">
            <span class="card-title">NETWORK ARCHITECTURE</span>
            <span class="card-subtitle" id="archSummary">2 → 4 → 4 → 1</span>
          </div>
          <canvas id="networkCanvas" width="400" height="180"></canvas>
        </div>

        <!-- Loss chart -->
        <div class="canvas-card">
          <div class="card-header">
            <span class="card-title">TRAINING LOSS</span>
          </div>
          <canvas id="lossCanvas" width="400" height="90"></canvas>
        </div>
      </div>
      <!-- /viz-panel -->

      <!-- Right: controls -->
      <div class="controls-panel">
        <!-- Architecture -->
        <div class="control-card">
          <div class="card-header">
            <span class="card-title">ARCHITECTURE</span>
          </div>
          <div class="control-body">
            <div class="slider-row">
              <label>Hidden Layers</label>
              <div class="slider-control">
                <input
                  type="range"
                  id="numLayers"
                  class="ctrl-slider"
                  min="0"
                  max="4"
                  value="2"
                />
                <span class="slider-val" id="numLayersVal">2</span>
              </div>
            </div>

            <div class="slider-row">
              <label>Neurons / Layer</label>
              <div class="slider-control">
                <input
                  type="range"
                  id="numNeurons"
                  class="ctrl-slider"
                  min="1"
                  max="8"
                  value="4"
                />
                <span class="slider-val" id="numNeuronsVal">4</span>
              </div>
            </div>

            <div class="ctrl-row">
              <label>Activation</label>
              <select id="activation" class="ctrl-select">
                <option value="relu" selected>ReLU</option>
                <option value="sigmoid">Sigmoid</option>
                <option value="tanh">Tanh</option>
                <option value="linear">Linear</option>
              </select>
            </div>

            <button class="btn btn-secondary" id="rebuildBtn">
              ⟳ Rebuild Network
            </button>
          </div>
        </div>

        <!-- Training -->
        <div class="control-card">
          <div class="card-header">
            <span class="card-title">TRAINING</span>
          </div>
          <div class="control-body">
            <div class="slider-row">
              <label>Learning Rate</label>
              <div class="slider-control">
                <input
                  type="range"
                  id="lrSlider"
                  class="ctrl-slider"
                  min="-4"
                  max="-0.5"
                  step="0.05"
                  value="-1"
                />
                <span class="slider-val" id="lrVal">0.1000</span>
              </div>
            </div>

            <div class="slider-row">
              <label>Steps / Frame</label>
              <div class="slider-control">
                <input
                  type="range"
                  id="stepsSlider"
                  class="ctrl-slider"
                  min="1"
                  max="50"
                  value="5"
                />
                <span class="slider-val" id="stepsVal">5</span>
              </div>
            </div>

            <div class="btn-row">
              <button class="btn btn-primary" id="trainBtn">▶ Train</button>
              <button class="btn btn-ghost" id="stepBtn">Step ×1</button>
            </div>

            <div class="btn-row">
              <button class="btn btn-ghost" id="resetWeightsBtn">
                Reset Weights
              </button>
              <button class="btn btn-ghost" id="clearDataBtn">
                Clear Data
              </button>
            </div>

            <div class="stats-grid">
              <div class="stat-item">
                <span class="stat-label">Points</span>
                <span id="pointCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Class A</span>
                <span id="classACount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Class B</span>
                <span id="classBCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Accuracy</span>
                <span id="accuracy">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Weights & Biases -->
        <div class="control-card weights-card">
          <div class="card-header">
            <span class="card-title">WEIGHTS &amp; BIASES</span>
            <button class="btn-tiny" id="randomizeWeightsBtn">Randomize</button>
          </div>
          <div id="slidersContainer" class="sliders-container"></div>
        </div>
      </div>
      <!-- /controls-panel -->
    </main>

    <script src="nn.js"></script>
    <script src="app.js"></script>
  </body>
</html>
